services:
  auth-db:
    image: postgres:17
    container_name: ascent-auth-db
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-mongo:
    image: mongo:8
    container_name: ascent-auth-mongo
    ports:
      - "27018:27017"
    volumes:
      - auth-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  content-db:
    image: postgres:17
    container_name: ascent-content-db
    environment:
      POSTGRES_USER: content
      POSTGRES_PASSWORD: content
      POSTGRES_DB: content
    ports:
      - "5434:5432"
    volumes:
      - content-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content -d content"]
      interval: 5s
      timeout: 3s
      retries: 5

  cohort-db:
    image: postgres:17
    container_name: ascent-cohort-db
    environment:
      POSTGRES_USER: cohort
      POSTGRES_PASSWORD: cohort
      POSTGRES_DB: cohort
    ports:
      - "5435:5432"
    volumes:
      - cohort-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohort -d cohort"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: ascent-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: ascent-auth
    depends_on:
      auth-db:
        condition: service_healthy
      auth-mongo:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://auth:auth@auth-db:5432/auth
      MONGODB_URL: mongodb://auth-mongo:27017
      MONGODB_DB: auth_activity
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    ports:
      - "3001:3001"

  content:
    build:
      context: .
      dockerfile: services/content/Dockerfile
    container_name: ascent-content
    depends_on:
      content-db:
        condition: service_healthy
    environment:
      PORT: 3002
      DATABASE_URL: postgres://content:content@content-db:5432/content
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3002:3002"

  cohort:
    build:
      context: .
      dockerfile: services/cohort/Dockerfile
    container_name: ascent-cohort
    depends_on:
      cohort-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 3003
      DATABASE_URL: postgres://cohort:cohort@cohort-db:5432/cohort
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3003:3003"

  progress-db:
    image: postgres:17
    container_name: ascent-progress-db
    environment:
      POSTGRES_USER: progress
      POSTGRES_PASSWORD: progress
      POSTGRES_DB: progress
    ports:
      - "5436:5432"
    volumes:
      - progress-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progress -d progress"]
      interval: 5s
      timeout: 3s
      retries: 5

  progress:
    build:
      context: .
      dockerfile: services/progress/Dockerfile
    container_name: ascent-progress
    depends_on:
      progress-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 3004
      DATABASE_URL: postgres://progress:progress@progress-db:5432/progress
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3004:3004"

  gateway:
    image: nginx:1.27-alpine
    container_name: ascent-gateway
    depends_on:
      - auth
      - content
      - cohort
      - progress
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  auth-db-data:
  auth-mongo-data:
  content-db-data:
  cohort-db-data:
  progress-db-data:
  kafka-data:
