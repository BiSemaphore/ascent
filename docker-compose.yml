services:
  auth-db:
    image: postgres:17
    container_name: ascent-auth-db
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-mongo:
    image: mongo:8
    container_name: ascent-auth-mongo
    ports:
      - "27018:27017"
    volumes:
      - auth-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  content-db:
    image: postgres:17
    container_name: ascent-content-db
    environment:
      POSTGRES_USER: content
      POSTGRES_PASSWORD: content
      POSTGRES_DB: content
    ports:
      - "5434:5432"
    volumes:
      - content-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content -d content"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  auth-db-data:
  auth-mongo-data:
  content-db-data:
