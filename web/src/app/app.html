<header class="topbar">
  <a class="brand" routerLink="/">Ascent</a>

  @if (auth.isLoggedIn()) {
    <nav class="nav">
      <a routerLink="/cohorts" routerLinkActive="active">Cohorts</a>
      <a routerLink="/programs" routerLinkActive="active">Catalog</a>
    </nav>

    <div class="right">
      <span class="who">{{ auth.user()?.email }} · {{ auth.user()?.role }}</span>
      <button
        class="icon-btn"
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        @if (theme() === 'dark') {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" stroke-linecap="round" />
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke-linejoin="round" />
          </svg>
        }
      </button>
      <button class="btn-link" type="button" (click)="logout()">Log out</button>
    </div>
  }
</header>

<main class="content">
  <router-outlet />
</main>
