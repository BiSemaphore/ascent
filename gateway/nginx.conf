worker_processes auto;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;

  upstream auth_upstream {
    server auth:3001;
  }

  upstream content_upstream {
    server content:3002;
  }

  upstream cohort_upstream {
    server cohort:3003;
  }

  upstream progress_upstream {
    server progress:3004;
  }

  server {
    listen 80;

    location /api/auth/ {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://auth_upstream/auth/;
    }

    location /api/content/ {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://content_upstream/;
    }

    location = /api/cohorts {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://cohort_upstream/;
    }

    location /api/cohorts/ {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://cohort_upstream/;
    }

    location = /api/progress {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://progress_upstream/;
    }

    location /api/progress/ {
      limit_req zone=perip burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://progress_upstream/;
    }

    location = /health {
      add_header Content-Type text/plain;
      return 200 'gateway ok\n';
    }
  }
}
